<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Deep-ocean tile -->
  <rect width="64" height="64" rx="14" fill="#0B1418" />

  <!-- Crescent moon: a BurzYellow disc carved by an offset ocean disc. The moon
       that drives the tides. -->
  <circle cx="38" cy="25" r="14" fill="#fdd32a" />
  <circle cx="46" cy="21" r="13" fill="#0B1418" />

  <!-- A teal tide swell along the bottom -->
  <path
    d="M8 48 C16 44 24 52 32 48 C40 44 48 52 56 48"
    fill="none"
    stroke="#0E7C86"
    stroke-width="3.5"
    stroke-linecap="round"
  />
</svg>
